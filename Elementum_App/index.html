<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elementum · Your elemental blueprint</title>

    <!-- Fonts: EB Garamond (body), Cormorant Garamond (display),
         Cinzel (architectural caps), Ma Shan Zheng (Chinese brush),
         Noto Serif SC (Chinese serif fallback) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: 'EB Garamond', Georgia, serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: #2B2722;
        background: #1a1815;
      }
      button { font-family: inherit; }

      /* Hide scrollbars globally — real iOS/Android already auto-hide them,
         but desktop browsers show a visible track that breaks the phone-frame
         illusion. Scroll still works; only the bar is suppressed. */
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { width: 0; height: 0; display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
